
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f8fafc; color: #222; }
    .container { max-width: 900px; margin: 24px auto; padding: 0 16px; }
    .card { background:white; border-radius:12px; padding:16px; box-shadow:0 2px 8px rgba(0,0,0,.08); margin-bottom:12px; }
    .actions a { margin-right: 8px; text-decoration:none; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Your Cart</h2>
    {% if items %}
      {% for item in items %}
      <div class="card">
        <h3>{{ item.product.name }}</h3>
        <p>Quantity: {{ item.qty }}</p>
        <p>Subtotal: ₹{{ '%.2f'|format(item.subtotal) }}</p>
      </div>
      {% endfor %}
      <h3>Total: ₹{{ '%.2f'|format(total) }}</h3>
      <div class="actions">
        <a href="{{ url_for('home') }}">Continue Shopping</a>
        <a href="{{ url_for('clear_cart') }}">Clear Cart</a>
      </div>
    {% else %}
      <p>Your cart is empty.</p>
      <a href="{{ url_for('home') }}">Back to Store</a>
    {% endif %}
  </div>
</body>
</html>
